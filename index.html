<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제9주차 학습 가이드 인포그래픽</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel CDN (For JSX translation in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 아이콘 컴포넌트 유틸리티 (SVG 직접 사용으로 호환성 확보)
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('summary');

            const comparisonData = [
                { label: '목적 (Purpose)', passover: '출애굽/구원의 기억', communion: '죄로부터의 구원/새 언약' },
                { label: '상징 (Symbols)', passover: '어린 양, 무교병, 쓴 나물', communion: '떡(예수의 몸), 잔(예수의 피)' },
                { label: '주기 (Frequency)', passover: '연 1회 (유대력)', communion: '정기적/자주 수행' },
                { label: '중심 인물 (Leader)', passover: '모세를 통해 시작', communion: '예수 그리스도가 친히 제정' },
            ];

            const Card = ({ title, children, iconName, colorClass, bgColorClass, iconColorClass }) => (
                <div className={`bg-white rounded-xl shadow-sm border-l-4 ${colorClass} p-6 mb-6 hover:shadow-md transition-shadow`}>
                    <div className="flex items-center mb-4">
                        <div className={`p-2 rounded-lg ${bgColorClass}`}>
                            <Icon name={iconName} className={`w-6 h-6 ${iconColorClass}`} />
                        </div>
                        <h3 className="ml-3 text-xl font-bold text-gray-800">{title}</h3>
                    </div>
                    {children}
                </div>
            );

            return (
                <div className="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
                    {/* Header */}
                    <div className="max-w-4xl mx-auto text-center mb-12">
                        <span className="inline-block px-4 py-1 rounded-full bg-indigo-100 text-indigo-700 font-semibold text-sm mb-4 uppercase tracking-wider">
                            Week 9 Study Guide
                        </span>
                        <h1 className="text-4xl font-extrabold text-gray-900 sm:text-5xl mb-4">
                            최후의 만찬, 고별 설교 및 기도
                        </h1>
                        <p className="text-xl text-gray-600 font-medium">
                            নবম সপ্তাহ : শেষ ভোজ, বিদায়ী ভাষণ এবং প্রার্থনা
                        </p>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="max-w-4xl mx-auto mb-10">
                        <div className="flex flex-wrap justify-center gap-2 border-b border-gray-200">
                            {[
                                { id: 'summary', label: '주요 요약 (Summary)' },
                                { id: 'comparison', label: '유월절 vs 성찬 (Comparison)' },
                                { id: 'worldview', label: '세상 속의 제자 (Worldview)' }
                            ].map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`px-6 py-3 text-sm font-medium transition-colors border-b-2 ${
                                        activeTab === tab.id 
                                        ? 'border-indigo-600 text-indigo-600' 
                                        : 'border-transparent text-gray-500 hover:text-indigo-400'
                                    }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Content Sections */}
                    <div className="max-w-4xl mx-auto">
                        {activeTab === 'summary' && (
                            <div className="animate-in grid md:grid-cols-2 gap-6">
                                <Card 
                                    title="유월절 어린 양 예수" 
                                    iconName="anchor" 
                                    colorClass="border-red-500"
                                    bgColorClass="bg-red-100"
                                    iconColorClass="text-red-500"
                                >
                                    <p className="text-gray-600 mb-3 text-sm italic font-Bengali">যীশুকে নিস্তারপর্বীয় মেষशাবক বলার কারণ:</p>
                                    <ul className="space-y-2">
                                        {['유월절 기간에 죽으심', '자신의 살을 주심', '자신의 피를 주심'].map((item, idx) => (
                                            <li key={idx} className="flex items-start">
                                                <Icon name="check-circle-2" className="w-5 h-5 text-red-500 mr-2 flex-shrink-0" />
                                                <span className="text-gray-700">{item}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </Card>

                                <Card 
                                    title="새 계명: 사랑" 
                                    iconName="heart" 
                                    colorClass="border-pink-500"
                                    bgColorClass="bg-pink-100"
                                    iconColorClass="text-pink-500"
                                >
                                    <p className="text-gray-700 leading-relaxed mb-4">
                                        "내가 너희를 사랑한 것 같이 너희도 서로 사랑하라."
                                    </p>
                                    <div className="bg-pink-50 p-3 rounded-lg border border-pink-100 text-sm text-pink-700">
                                        <strong>실천의 본:</strong> 제자들의 발을 씻겨 주심으로써 섬김의 사랑을 증명하셨습니다.
                                    </div>
                                </Card>

                                <Card 
                                    title="겟세마네의 고뇌" 
                                    iconName="cross" 
                                    colorClass="border-gray-700"
                                    bgColorClass="bg-gray-100"
                                    iconColorClass="text-gray-700"
                                >
                                    <p className="text-gray-600 mb-2 text-sm">고통의 원인:</p>
                                    <div className="space-y-2">
                                        <div className="flex items-center text-gray-700">
                                            <Icon name="chevron-right" className="w-4 h-4 mr-1 text-gray-400" />
                                            <span>구원을 위한 대가 지불</span>
                                        </div>
                                        <div className="flex items-center text-gray-700">
                                            <Icon name="chevron-right" className="w-4 h-4 mr-1 text-gray-400" />
                                            <span>고난의 잔을 수용</span>
                                        </div>
                                    </div>
                                </Card>

                                <Card 
                                    title="예수님과의 연합" 
                                    iconName="users" 
                                    colorClass="border-blue-500"
                                    bgColorClass="bg-blue-100"
                                    iconColorClass="text-blue-500"
                                >
                                    <p className="text-gray-700 font-medium">사랑과 순종 (Love & Obedience)</p>
                                    <p className="text-sm text-gray-600 mt-2">
                                        예수님에 대한 사랑과 말씀에 대한 순종이 우리를 그분과 내면적으로 깊이 일치(연합)시킵니다.
                                    </p>
                                </Card>
                            </div>
                        )}

                        {activeTab === 'comparison' && (
                            <div className="animate-in bg-white rounded-xl shadow-sm overflow-hidden border border-gray-200">
                                <div className="bg-indigo-600 px-6 py-4">
                                    <h3 className="text-white font-bold flex items-center">
                                        <Icon name="arrow-right-left" className="w-5 h-5 mr-2" />
                                        유월절 vs 주의 만찬 (성찬식)
                                    </h3>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-gray-50 border-b border-gray-200">
                                            <tr>
                                                <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider">항목</th>
                                                <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-red-600">유월절 (Passover)</th>
                                                <th className="px-6 py-4 text-xs font-semibold text-gray-500 uppercase tracking-wider text-indigo-600">주의 만찬 (Communion)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-200 text-sm">
                                            {comparisonData.map((row, idx) => (
                                                <tr key={idx} className="hover:bg-gray-50 transition-colors">
                                                    <td className="px-6 py-4 font-bold text-gray-700 bg-gray-50/50">{row.label}</td>
                                                    <td className="px-6 py-4 text-gray-600">{row.passover}</td>
                                                    <td className="px-6 py-4 text-gray-600 font-medium">{row.communion}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-4 bg-yellow-50 text-xs text-yellow-800 italic">
                                    * 공통점: 구원의 기억, 피의 중요성, 무교병(순결) 사용, 하나님의 언약 확증
                                </div>
                            </div>
                        )}

                        {activeTab === 'worldview' && (
                            <div className="animate-in space-y-6">
                                <div className="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl p-8 text-white shadow-lg">
                                    <h2 className="text-2xl font-bold mb-6 flex items-center">
                                        <Icon name="sun" className="w-7 h-7 mr-3" />
                                        세상과 제자의 관계
                                    </h2>
                                    <div className="grid md:grid-cols-3 gap-6 text-sm">
                                        {[
                                            { t: '세상에 있으나', d: '물리적으로 세상에 살지만, 소속과 가치관은 하늘나라에 있습니다. (In but not of)' },
                                            { t: '본받지 말라', d: '세상의 타락한 가치관을 따르지 않고, 하나님의 뜻을 분별하여 변화된 삶을 삽니다.' },
                                            { t: '소금과 빛', d: '세상을 외면하지 않고 부패를 방지하며 어둠을 밝히는 적극적인 역할을 수행합니다.' }
                                        ].map((item, i) => (
                                            <div key={i} className="bg-white/10 backdrop-blur-md p-5 rounded-xl border border-white/20">
                                                <h4 className="font-bold text-lg mb-2">{item.t}</h4>
                                                <p className="text-indigo-50 leading-relaxed">{item.d}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-xl border border-gray-200 shadow-sm">
                                    <h3 className="font-bold text-gray-800 mb-4 flex items-center">
                                        <Icon name="info" className="w-5 h-5 mr-2 text-indigo-500" />
                                        성경적 통찰 (Insight)
                                    </h3>
                                    <p className="text-gray-600 text-sm italic">
                                        "많은 종교 지도자들이 예수님을 반대했지만, 일부는 마음속으로 그분을 지지했습니다. 선한 일을 멈추지 않을 때, 하나님께서는 반드시 동역자와 지지자를 예비하십니다."
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Footer */}
                    <div className="max-w-4xl mx-auto mt-16 pt-8 border-t border-gray-200 text-center text-gray-400 text-sm">
                        <p>© 2024 Study Guide Week 9 - Theological Insight & Education</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
